<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أدخل الإجابة</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Tahoma', 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e1b4b 0%, #4c1d95 50%, #1e1b4b 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 20px;
    padding: 40px 30px;
    max-width: 440px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    transition: all 0.3s ease;
  }
  .icon {
    font-size: 48px;
    margin-bottom: 16px;
  }
  h1 {
    color: #fff;
    font-size: 22px;
    margin-bottom: 8px;
  }
  p.sub {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    margin-bottom: 28px;
  }
  .hint-label {
    color: rgba(255,255,255,0.45);
    font-size: 14px;
    margin-bottom: 8px;
    letter-spacing: 2px;
  }
  input[type="text"] {
    width: 100%;
    padding: 16px;
    font-size: 20px;
    text-align: center;
    letter-spacing: 4px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.08);
    color: #fff;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus {
    border-color: #a78bfa;
  }
  input::placeholder {
    color: rgba(255,255,255,0.35);
  }
  button {
    margin-top: 18px;
    width: 100%;
    padding: 16px;
    font-size: 17px;
    font-weight: bold;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #8b5cf6, #6d28d9);
    color: #fff;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(139,92,246,0.4);
  }
  button:active {
    transform: translateY(0);
  }
  .error {
    color: #f87171;
    margin-top: 14px;
    font-size: 14px;
    height: 18px;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .error.show {
    opacity: 1;
  }
  .shake {
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  #resultImage {
    width: 100%;
    border-radius: 14px;
    margin-top: 20px;
    display: none;
  }
  .success-text {
    color: #4ade80;
    font-size: 15px;
    margin-top: 14px;
    display: none;
  }
  #gate.hidden {
    display: none;
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div id="gate">
    <div class="icon">🔒</div>
    <h1>أدخل الإجابة الصحيحة</h1>
    <p class="sub">للوصول إلى الصورة</p>
    <div class="hint-label">1234</div>
    <input type="text" id="answerInput" placeholder="الإجابة هنا" autocomplete="off" inputmode="numeric">
    <button onclick="checkAnswer()">تأكيد</button>
    <div class="error" id="errorMsg">جرّب مرة أخرى</div>
  </div>
  <div class="success-text" id="successMsg">✅ إجابة صحيحة!</div>

  <!-- غيّر رابط الصورة هنا -->
<video id="resultImage" controls autoplay>
  <source src="na.mp4" type="video/mp4">
</video></div>

<script>
  const CORRECT_ANSWER = "14481";

  function toWesternDigits(str) {
    const arabicIndic = "٠١٢٣٤٥٦٧٨٩";
    const extArabicIndic = "۰۱۲۳۴۵۶۷۸۹";
    return str.split("").map(ch => {
      let idx = arabicIndic.indexOf(ch);
      if (idx !== -1) return String(idx);
      idx = extArabicIndic.indexOf(ch);
      if (idx !== -1) return String(idx);
      return ch;
    }).join("");
  }

  const input = document.getElementById('answerInput');
  const card = document.getElementById('card');
  const gate = document.getElementById('gate');
  const errorMsg = document.getElementById('errorMsg');
  const successMsg = document.getElementById('successMsg');
  const image = document.getElementById('resultImage');

  function checkAnswer() {
    const value = toWesternDigits(input.value.trim());
    if (value === CORRECT_ANSWER) {
      gate.classList.add('hidden');
      successMsg.style.display = 'block';
      image.style.display = 'block';
    } else {
      errorMsg.classList.add('show');
      card.classList.remove('shake');
      void card.offsetWidth;
      card.classList.add('shake');
      input.value = '';
      input.focus();
      setTimeout(() => errorMsg.classList.remove('show'), 2000);
    }
  }

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkAnswer();
  });
</script>
</body>
</html>
